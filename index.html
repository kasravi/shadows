<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Shadows — MediaPipe Real-Time Puppets</title>
    <meta name="description" content="Cast real-time dark shadow silhouettes and skeletons on a virtual wall using MediaPipe Pose.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
    
    <!-- MediaPipe Pose CDN (Classic build) -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>

    <style>
        :root {
            --bg-color: #0d0c10;
            --card-bg: rgba(25, 23, 32, 0.85);
            --wall-bg-light: radial-gradient(circle at center, #f4ecd8 0%, #e2d4b7 70%, #c1b092 100%);
            --wall-bg-warm: radial-gradient(circle at center, #fff6e5 0%, #ecdcb9 60%, #cca972 100%);
            --accent-glow: rgba(220, 180, 120, 0.4);
            --text-main: #f3ece0;
            --text-muted: #a39c90;
            --shadow-color: rgba(15, 12, 8, 0.95);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Hamburger Button */
        .menu-trigger {
            position: absolute;
            top: 24px;
            right: 24px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--card-bg);
            border: 1px solid rgba(244, 236, 216, 0.15);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            z-index: 100;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(12px);
        }

        .menu-trigger:hover {
            transform: scale(1.05);
            border-color: rgba(244, 236, 216, 0.4);
            box-shadow: 0 4px 20px var(--accent-glow);
        }

        .menu-trigger span {
            display: block;
            width: 22px;
            height: 2px;
            background: var(--text-main);
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        /* Hamburger Open States */
        .menu-trigger.open span:nth-child(1) {
            transform: translateY(7px) rotate(45deg);
        }
        .menu-trigger.open span:nth-child(2) {
            opacity: 0;
        }
        .menu-trigger.open span:nth-child(3) {
            transform: translateY(-7px) rotate(-45deg);
        }

        /* Side Settings Panel (Right Slide-out) */
        .side-panel {
            position: absolute;
            right: -320px;
            top: 0;
            width: 320px;
            height: 100%;
            background: var(--card-bg);
            border-left: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(24px);
            padding: 96px 32px 32px 32px;
            z-index: 90;
            display: flex;
            flex-direction: column;
            gap: 28px;
            box-shadow: -10px 0 40px rgba(0, 0, 0, 0.5);
            transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .side-panel.open {
            right: 0;
        }

        .panel-section-title {
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .controls-vertical {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(244, 236, 216, 0.15);
            color: var(--text-main);
            padding: 12px 20px;
            border-radius: 30px;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(244, 236, 216, 0.4);
        }

        .btn.active {
            background: #f4ecd8;
            color: #1a1510;
            border-color: #f4ecd8;
        }

        .btn-toggle-active {
            border-color: #cca972;
            color: #cca972;
        }

        .btn-toggle-active.enabled {
            background: #cca972;
            color: #1a1510;
        }

        main {
            flex: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
        }

        /* The canvas represents the backlit wall */
        #shadowCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: var(--wall-bg-light);
            transition: background 0.5s ease;
        }

        /* Hidden video element for feed */
        #webcam {
            display: none;
        }

        /* Status Indicator */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            font-size: 0.8rem;
            font-weight: 600;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff4a4a;
        }

        .status-dot.active {
            background: #4ade80;
            box-shadow: 0 0 8px #4ade80;
        }

        .setting-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .setting-group label {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
        }

        .setting-group input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            border-radius: 2px;
            background: rgba(255, 255, 255, 0.2);
            outline: none;
        }

        .setting-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #f4ecd8;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .setting-group input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.3);
        }
    </style>
</head>
<body>

    <!-- Hamburger menu button -->
    <div class="menu-trigger" id="menuBtn">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <main>
        <canvas id="shadowCanvas"></canvas>
        <video id="webcam" autoplay playsinline></video>

        <!-- Right Slide-out Panel -->
        <div class="side-panel" id="sidePanel">
            <div class="setting-group">
                <div class="panel-section-title">Controls</div>
                <div class="controls-vertical">
                    <button id="btnCamera" class="btn active">Start Camera</button>
                    <button id="toggleSkeleton" class="btn btn-toggle-active enabled">Skeleton: On</button>
                    <button id="toggleWallColor" class="btn">Warm Light</button>
                </div>
            </div>

            <div class="setting-group">
                <label for="blurSlider">Shadow Softness</label>
                <input type="range" id="blurSlider" min="0" max="30" value="12">
            </div>

            <div class="setting-group">
                <label for="densitySlider">Shadow Opacity</label>
                <input type="range" id="densitySlider" min="10" max="100" value="90">
            </div>

            <div class="setting-group" style="margin-top: 12px;">
                <p id="cardText" style="font-size: 0.85rem; color: var(--text-muted); line-height: 1.4; text-align: center;">
                    Step back so your body is visible to cast a complete shadow figurine on the wall.
                </p>
            </div>

            <div style="margin-top: auto; text-align: center;">
                <div class="status-badge">
                    <div class="status-dot" id="statusDot"></div>
                    <span id="statusText">Camera Inactive</span>
                </div>
            </div>
        </div>
    </main>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('shadowCanvas');
        const ctx = canvas.getContext('2d');
        const btnCamera = document.getElementById('btnCamera');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const cardText = document.getElementById('cardText');
        const toggleSkeletonBtn = document.getElementById('toggleSkeleton');
        const toggleWallColorBtn = document.getElementById('toggleWallColor');
        const blurSlider = document.getElementById('blurSlider');
        const densitySlider = document.getElementById('densitySlider');
        const menuBtn = document.getElementById('menuBtn');
        const sidePanel = document.getElementById('sidePanel');

        let pose;
        let camera = null;
        let webcamRunning = false;

        // Toggle Right Panel
        menuBtn.addEventListener('click', () => {
            menuBtn.classList.toggle('open');
            sidePanel.classList.toggle('open');
        });

        // Customization states
        let showSkeleton = true;
        let wallWarmTheme = false;
        let shadowBlur = 12;
        let shadowOpacity = 0.9;

        // Initialize MediaPipe Pose
        function initPose() {
            try {
                statusText.innerText = "Loading Pose models...";
                pose = new Pose({
                    locateFile: (file) => {
                        return `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`;
                    }
                });

                pose.setOptions({
                    modelComplexity: 1,
                    smoothLandmarks: true,
                    enableSegmentation: true,
                    smoothSegmentation: true,
                    minDetectionConfidence: 0.5,
                    minTrackingConfidence: 0.5
                });

                pose.onResults(onPoseResults);

                statusText.innerText = "Models Loaded";
                statusDot.classList.add('active');
            } catch (err) {
                console.error("Failed to load Pose:", err);
                statusText.innerText = "Model load failed";
            }
        }

        // Initialize App
        initPose();

        // Toggle Webcam
        async function toggleWebcam() {
            if (!pose) {
                alert("Please wait for the models to finish loading.");
                return;
            }

            if (webcamRunning) {
                webcamRunning = false;
                btnCamera.innerText = "Start Camera";
                btnCamera.classList.remove('active');
                statusDot.classList.remove('active');
                statusText.innerText = "Camera Stopped";
                cardText.innerText = "Turn on the camera to see your shadows cast on the wall.";
                
                if (camera) {
                    await camera.stop();
                    camera = null;
                }
            } else {
                webcamRunning = true;
                btnCamera.innerText = "Stop Camera";
                btnCamera.classList.add('active');
                statusDot.classList.add('active');
                statusText.innerText = "Camera Active";
                cardText.innerText = "Move around! Step back so your body is visible to cast a complete shadow figurine.";

                camera = new Camera(video, {
                    onFrame: async () => {
                        if (webcamRunning) {
                            await pose.send({ image: video });
                        }
                    },
                    width: 1280,
                    height: 720
                });
                
                try {
                    await camera.start();
                } catch (err) {
                    console.error("Webcam access denied:", err);
                    statusText.innerText = "Camera Access Denied";
                    statusDot.classList.remove('active');
                    webcamRunning = false;
                    btnCamera.innerText = "Start Camera";
                }
            }
        }

        btnCamera.addEventListener("click", toggleWebcam);

        // UI Interactions
        toggleSkeletonBtn.addEventListener("click", () => {
            showSkeleton = !showSkeleton;
            if (showSkeleton) {
                toggleSkeletonBtn.innerText = "Skeleton: On";
                toggleSkeletonBtn.classList.add('enabled');
            } else {
                toggleSkeletonBtn.innerText = "Skeleton: Off";
                toggleSkeletonBtn.classList.remove('enabled');
            }
        });

        toggleWallColorBtn.addEventListener("click", () => {
            wallWarmTheme = !wallWarmTheme;
            if (wallWarmTheme) {
                canvas.style.background = "var(--wall-bg-warm)";
                toggleWallColorBtn.innerText = "Cool Light";
            } else {
                canvas.style.background = "var(--wall-bg-light)";
                toggleWallColorBtn.innerText = "Warm Light";
            }
        });

        blurSlider.addEventListener("input", (e) => {
            shadowBlur = parseInt(e.target.value);
        });

        densitySlider.addEventListener("input", (e) => {
            shadowOpacity = parseFloat(e.target.value) / 100;
        });

        // Resize handler to fit screen properly
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Draw shadow figurines (Masks & Skeletons)
        function onPoseResults(results) {
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (!results || !results.poseLandmarks) {
                return;
            }

            ctx.save();
            // Mirror coordinates for intuitive camera interaction
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);

            const scaleX = canvas.width;
            const scaleY = canvas.height;
            const landmarks = results.poseLandmarks;

            // Configure shadow aesthetics
            ctx.shadowColor = 'rgba(10, 8, 5, 0.8)';
            ctx.shadowBlur = shadowBlur;
            ctx.filter = `blur(${shadowBlur}px)`;
            ctx.fillStyle = `rgba(20, 18, 15, ${shadowOpacity})`;
            ctx.strokeStyle = `rgba(20, 18, 15, ${shadowOpacity})`;

            // Draw Silhouette Mask
            if (results.segmentationMask) {
                // If segmentation mask exists, draw it using composition to generate pixel-level shadow
                ctx.save();
                ctx.filter = `blur(${shadowBlur}px) grayscale(100%) brightness(0%) opacity(${shadowOpacity})`;
                
                // Create temporary canvas to mirror & stretch mask to fit screen size
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = results.segmentationMask.width;
                tempCanvas.height = results.segmentationMask.height;
                const tempCtx = tempCanvas.getContext('2d');
                tempCtx.drawImage(results.segmentationMask, 0, 0);
                
                ctx.drawImage(tempCanvas, 0, 0, scaleX, scaleY);
                ctx.restore();
            } else {
                // Fallback to organic thick skeleton silhouette if segmentation mask is loading/absent
                drawOrganicSilhouette(landmarks, scaleX, scaleY);
            }

            // Draw Skeleton Joint lines
            if (showSkeleton) {
                ctx.save();
                ctx.filter = `none`;
                ctx.shadowBlur = 4;
                ctx.lineWidth = 6;
                ctx.strokeStyle = `rgba(10, 8, 5, ${shadowOpacity + 0.1})`;
                ctx.fillStyle = `rgba(10, 8, 5, ${shadowOpacity + 0.1})`;

                drawSkeletonJoints(landmarks, scaleX, scaleY);
                ctx.restore();
            }

            ctx.restore();
        }

        // Helper to draw filled contour shape matching the body shape landmarks
        function drawOrganicSilhouette(landmarks, sx, sy) {
            ctx.beginPath();

            // Head circle
            const nose = landmarks[0];
            const leftEar = landmarks[7];
            const rightEar = landmarks[8];
            if (nose) {
                const hx = nose.x * sx;
                const hy = nose.y * sy;
                let hr = 25;
                if (leftEar && rightEar) {
                    hr = Math.hypot((leftEar.x - rightEar.x)*sx, (leftEar.y - rightEar.y)*sy) * 0.8;
                }
                ctx.arc(hx, hy, Math.max(hr, 18), 0, 2 * Math.PI);
                ctx.fill();
            }

            const connections = [
                [11, 12], [12, 24], [24, 23], [23, 11], // Torso
                [11, 13], [13, 15], // Left Arm
                [12, 14], [14, 16], // Right Arm
                [23, 25], [25, 27], [27, 31], // Left Leg
                [24, 26], [26, 28], [28, 32]  // Right Leg
            ];

            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            connections.forEach(([p1, p2]) => {
                const pt1 = landmarks[p1];
                const pt2 = landmarks[p2];
                if (pt1 && pt2 && pt1.visibility > 0.5 && pt2.visibility > 0.5) {
                    ctx.beginPath();
                    ctx.lineWidth = 42;
                    ctx.moveTo(pt1.x * sx, pt1.y * sy);
                    ctx.lineTo(pt2.x * sx, pt2.y * sy);
                    ctx.stroke();
                }
            });
        }

        // Helper to draw skeleton bones
        function drawSkeletonJoints(landmarks, sx, sy) {
            const connections = [
                [11, 12],
                [11, 13], [13, 15],
                [12, 14], [14, 16],
                [11, 23], [12, 24], [23, 24],
                [23, 25], [25, 27],
                [24, 26], [26, 28]
            ];

            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            connections.forEach(([p1, p2]) => {
                const pt1 = landmarks[p1];
                const pt2 = landmarks[p2];
                if (pt1 && pt2 && pt1.visibility > 0.55 && pt2.visibility > 0.55) {
                    ctx.beginPath();
                    ctx.moveTo(pt1.x * sx, pt1.y * sy);
                    ctx.lineTo(pt2.x * sx, pt2.y * sy);
                    ctx.stroke();
                }
            });

            const joints = [11, 12, 13, 14, 15, 16, 23, 24, 25, 26, 27, 28];
            joints.forEach(j => {
                const pt = landmarks[j];
                if (pt && pt.visibility > 0.55) {
                    ctx.beginPath();
                    ctx.arc(pt.x * sx, pt.y * sy, 7, 0, 2 * Math.PI);
                    ctx.fill();
                }
            });
        }
    </script>
</body>
</html>
